<!DOCTYPE html>
<html lang="en" data-static="true">
<head>
  <meta charset="UTF-8" />
  <meta name="base-url" content="." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeaSky Apartments — Booking Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <link rel="stylesheet" href="style.css" />
  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    (function () {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- ═══ TOP HEADER ════════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">&#9776;</button>
      <a class="header-logo" href="https://s2kdesign-com.github.io/seasky-penthouse/" target="_blank" rel="noopener">
        <img src="https://seasky-apartments.com/wp-content/uploads/2024/10/seasky-apartments-logo-110x220-1.webp"
             alt="SeaSky Apartments" />
        <span class="header-logo-text">
          SeaSky
          <span>Booking Dashboard</span>
        </span>
      </a>
    </div>
    <div class="header-right">
      <div id="header-auth" class="header-auth"></div>
    </div>
  </header>

  <!-- ═══ LAYOUT ════════════════════════════════════════════════════════════ -->
  <div class="layout">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <ul class="nav-list">
        <li>
          <a class="nav-item active" data-page="dashboard" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
        </li>
        <li class="nav-admin-only">
          <a class="nav-item" data-page="users" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Users
          </a>
        </li>
        <li class="nav-admin-only">
          <a class="nav-item" data-page="logs" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Logs
          </a>
        </li>
        <li class="nav-divider"></li>
        <li>
          <a class="nav-item" data-page="settings" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="main" id="main">

      <!-- ── Dashboard page ─────────────────────────────────────────────── -->
      <div id="page-dashboard" class="page active">
        <div class="page-header">
          <h1 class="page-title">Dashboard</h1>
          <div class="page-actions">
            <div id="legend" class="legend"></div>
            <span id="last-sync-label" class="sync-label">Last sync: —</span>
            <button id="sync-btn" class="btn-sync">&#8635; Sync now</button>
          </div>
        </div>
        <div class="stats-row" id="stats-row"></div>
        <div class="calendar-wrapper">
          <div id="calendar"></div>
        </div>
      </div>

      <!-- ── Users page ─────────────────────────────────────────────────── -->
      <div id="page-users" class="page">
        <div class="page-header">
          <h1 class="page-title">Users</h1>
        </div>
        <div class="card" id="users-content">
          <p class="loading-text">Loading…</p>
        </div>
      </div>

      <!-- ── Settings page ─────────────────────────────────────────────── -->
      <div id="page-settings" class="page">
        <div class="page-header">
          <h1 class="page-title">Settings</h1>
        </div>
        <div class="settings-section">
          <h2 class="settings-heading">Appearance</h2>
          <div class="settings-card">
            <div class="settings-row">
              <div class="settings-label">
                <span class="settings-label-title">Theme</span>
                <span class="settings-label-desc">Choose how the dashboard looks</span>
              </div>
              <div class="theme-options" id="theme-options">
                <button class="theme-btn" data-theme="dark">
                  <span class="theme-preview theme-preview-dark">
                    <span class="tp-header"></span>
                    <span class="tp-sidebar"></span>
                    <span class="tp-body"></span>
                  </span>
                  <span class="theme-btn-label">Dark</span>
                </button>
                <button class="theme-btn" data-theme="light">
                  <span class="theme-preview theme-preview-light">
                    <span class="tp-header"></span>
                    <span class="tp-sidebar"></span>
                    <span class="tp-body"></span>
                  </span>
                  <span class="theme-btn-label">Light</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <h2 class="settings-heading" style="margin-top:24px">Notifications</h2>
        <div class="settings-card">
          <div class="settings-row">
            <div class="settings-label">
              <span class="settings-label-title">Push notifications</span>
              <span class="settings-label-desc">Get notified when new bookings are detected</span>
            </div>
            <div>
              <label class="toggle-switch">
                <input type="checkbox" id="push-toggle" />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
              </label>
              <p id="push-status" class="push-status"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Logs page ──────────────────────────────────────────────────── -->
      <div id="page-logs" class="page">
        <div class="page-header">
          <h1 class="page-title">Activity Logs</h1>
          <div class="page-actions">
            <button class="btn-sync" id="logs-refresh">&#8635; Refresh</button>
          </div>
        </div>
        <div class="card" id="logs-content">
          <p class="loading-text">Loading…</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Event detail / edit modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
