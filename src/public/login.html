<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeaSky Apartments — Sign In</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Apply saved theme before paint -->
  <script>
    (function () {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface-2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e8e2d9;
      --text-muted: #8a8278;
      --accent: #fcca41;
      --header-bg: #000000;
    }
    [data-theme="light"] {
      --bg: #f8f6f1;
      --surface: #ffffff;
      --surface-2: #f0ede6;
      --border: #ddd8ce;
      --text: #1a1a1a;
      --text-muted: #6b6560;
      --accent: #dd8502;
      --header-bg: #000000;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--header-bg);
      border-bottom: 2px solid var(--accent);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .header-logo img {
      height: 36px;
      width: auto;
    }
    .header-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
    }
    .header-logo-text span {
      font-size: 0.65rem;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 1px;
    }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 36px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }
    .btn-google:hover {
      border-color: var(--accent);
      background: var(--surface);
    }
    .btn-google svg { flex-shrink: 0; }

    .login-note {
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .error-box {
      background: rgba(220, 50, 50, 0.1);
      border: 1px solid rgba(220, 50, 50, 0.35);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #e07070;
      text-align: left;
      display: none;
    }
    .error-box.visible { display: block; }
  </style>
</head>
<body>

  <header class="header">
    <a class="header-logo" href="https://s2kdesign-com.github.io/seasky-penthouse/" target="_blank" rel="noopener">
      <img src="https://seasky-apartments.com/wp-content/uploads/2024/10/seasky-apartments-logo-110x220-1.webp"
           alt="SeaSky Apartments" />
      <span class="header-logo-text">
        SeaSky
        <span>Booking Dashboard</span>
      </span>
    </a>
  </header>

  <div class="login-wrap">
    <div class="login-card">
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to access the booking dashboard</p>

      <div class="error-box" id="error-box"></div>

      <a class="btn-google" href="/auth/google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </a>

      <div class="divider"></div>

      <p class="login-note">
        Access is restricted to authorised users only.<br />
        Contact the administrator if you need access.
      </p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.has('error')) {
      const box = document.getElementById('error-box');
      const msg = params.get('error');
      box.textContent = msg === 'access_denied'
        ? 'Access denied. Your account is not authorised to use this dashboard.'
        : 'Sign-in failed. Please try again.';
      box.classList.add('visible');
    }
  </script>

</body>
</html>
